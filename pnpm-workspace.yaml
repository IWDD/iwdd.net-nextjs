# Supply-chain security (pnpm v11+, 単位: 分)
# 2880 = 48h。pnpm v11 デフォルト (1440/24h) より厳しくした独自値で、
# 手動 pnpm add や lockFileMaintenance / pin 経由で入る間接依存にも 48h の猶予を与える。
# Renovate 側でも config:best-practices の security:minimumReleaseAgeNpm により
# npm パッケージは公開 3 日待ちとなり、pnpm floor (2日) <= Renovate gate (3日) を維持する。
minimumReleaseAge: 2880

# Build script policy (pnpm v11+)
# v10 の onlyBuiltDependencies は v11 で削除され、allowBuilds map に統合された。
# strictDepBuilds: true (v11 デフォルト) のため、明示されていない build script は install を fail させる。
#
# 方針: pnpm 10 時代はそもそも postinstall script はデフォルトでブロックされていた
# (本リポジトリでは onlyBuiltDependencies が未設定だった = 全 build script がブロック済み)。
# pnpm 11 で同じ挙動を維持するため、ここに列挙したパッケージは false (= 明示的に build skip)
# として strictDepBuilds の install fail を回避する。
# 個別に build を実行する必要が出たら true に切り替える。
allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false
  workerd: false
minimumReleaseAgeExclude:
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
